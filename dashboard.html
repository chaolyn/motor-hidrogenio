<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>hidrocar | Painel de Controle Híbrido</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="fueltech-theme">
    <nav>
        <a href="index.html" class="logo">hidrocar</a>
        <div class="nav-controls">
            <select id="kitSelect" class="kit-selector" onchange="changeKit()">
                <option value="TURBO">MODO: TURBO</option>
                <option value="BITURBO">MODO: BITURBO</option>
                <option value="SUPERCHARGER">MODO: SUPERCHARGER</option>
            </select>
            <button id="btnStop" class="emergency-btn" onclick="toggleSystem()">DESATIVAR H2</button>
        </div>
    </nav>

    <main class="content-section">
        <div id="status-bar" class="status-online">SISTEMA OPERACIONAL</div>

        <div class="grid-dash">
            <div class="stat-card h2-border">
                <div class="label">INJEÇÃO H2 (L/s)</div>
                <div class="stat-value" id="h2-vazao" style="color: var(--neon-blue);">0.00</div>
                <div class="sub-label" id="rpm-display">0 RPM</div>
            </div>

            <div class="stat-card porsche-border">
                <div class="label">VÁLVULA TÉRMICA (TMM)</div>
                <div class="stat-value" id="tmm" style="color: var(--porsche-orange);">0%</div>
                <div class="sub-label">FLUXO DE ARREFECIMENTO</div>
            </div>

            <div class="stat-card solar-border">
                <div class="label">CARGA SOLAR</div>
                <div class="stat-value" id="solar" style="color: var(--solar-gold);">0.0V</div>
                <div class="sub-label">CAPTAÇÃO ATIVA</div>
            </div>
        </div>

        <div class="glass-card log-container">
            <h3>LOG DE EVENTOS (SQL REAL-TIME)</h3>
            <div id="sql-log" class="sql-code">-- Aguardando inicialização...</div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
